<div class="admin-dashboard">
  <header class="dashboard-header">
    <div class="header-main">
      <div class="logo">
        <span class="icon">📝</span>
        <h1>Notes Manager</h1>
      </div>
      <nav class="main-nav">
        <a routerLink="/notes" class="nav-link active">Notes</a>
        <a routerLink="/activity-log" class="nav-link">Display Log</a>
        <button class="btn-logout" (click)="logout()">Logout</button>
      </nav>
    </div>
  </header>

  <main class="dashboard-content single-col">
    <section class="notes-section">
      <div class="card glass">
        <h2>Add New Note</h2>
        <form (ngSubmit)="addNote()" #noteForm="ngForm" class="add-note-form">
          <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" [(ngModel)]="newNote.title" required placeholder="Enter note title...">
          </div>
          <div class="form-group">
            <label>Content</label>
            <textarea name="content" [(ngModel)]="newNote.content" required
              placeholder="Write your note here..."></textarea>
          </div>
          <button type="submit" class="btn-primary" [disabled]="!noteForm.form.valid">Add Note</button>
        </form>
      </div>
    </section>
  </main>
</div>
